# nginx.conf override if we were mapping directly to root, but letting default run for port 80/3000 mapping
server {
    listen       3000;
    server_name  localhost;

    charset utf-8;

    error_page   500 502 503 504  /50x.html;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
