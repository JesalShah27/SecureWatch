# SecureWatch Agent Configuration

server:
  host: "127.0.0.1"
  port: 8000
  protocol: "http"

agent:
  id: ""
  token: ""
  group: "default"
  heartbeat_interval: 30

modules:
  log_collector:
    enabled: true
    paths:
      - /var/log/syslog
      - /var/log/auth.log
  process_monitor:
    enabled: true
    interval: 10
  network_monitor:
    enabled: true
    interval: 15
  fim:
    enabled: true
    interval: 60
    directories:
      - /etc
      - /bin
      - /sbin
      - /usr/bin
      - /var/log
      - C:\Windows\System32
      - C:\Windows\SysWOW64
  vuln_scanner:
    enabled: true
    interval: 86400  # Scan once a day by default
  sca:
    enabled: true
    interval: 43200  # Scan twice a day
    policies_dir: "config/policies"
  rootkit_detector:
    enabled: true
    interval: 3600   # Scan every hour
