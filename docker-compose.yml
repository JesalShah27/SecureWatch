version: '3.8'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: securewatch-elasticsearch
    environment:
      - node.name=securewatch-node-1
      - cluster.name=securewatch-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - securewatch-es-data:/usr/share/elasticsearch/data
    ports:
      - "0.0.0.0:9200:9200"   # Accessible from home network
    networks:
      - securewatch-net
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: securewatch-logstash
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - "LS_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "0.0.0.0:5044:5044"       # Beats input (Filebeat, Metricbeat, Packetbeat, Winlogbeat)
      - "0.0.0.0:5140:5140/udp"   # Syslog UDP - routers, firewalls, Linux devices
      - "0.0.0.0:5140:5140/tcp"   # Syslog TCP - more reliable delivery
      - "0.0.0.0:5055:5055"       # Linux Auth logs via Filebeat
      - "0.0.0.0:5514:5514/udp"   # Windows Event Log forwarding (WEF over syslog)
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - securewatch-net
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9600/_node/os >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: securewatch-kibana
    environment:
      - SERVER_NAME=securewatch-kibana
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "0.0.0.0:5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - securewatch-net
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"level\":\"available\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: securewatch-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass123!}
    ports:
      - "127.0.0.1:6379:6379"   # Redis only on localhost - no external access needed
    volumes:
      - securewatch-redis-data:/data
    networks:
      - securewatch-net
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: securewatch-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-siemuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-siempass123!}
      - POSTGRES_DB=${POSTGRES_DB:-siemdb}
    ports:
      - "127.0.0.1:5432:5432"   # Postgres only on localhost
    volumes:
      - securewatch-pg-data:/var/lib/postgresql/data
    networks:
      - securewatch-net
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-siemuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: securewatch-backend
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass123!}@redis:6379/0
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-siemuser}:${POSTGRES_PASSWORD:-siempass123!}@postgres:5432/${POSTGRES_DB:-siemdb}
      - JWT_SECRET=${JWT_SECRET:-super_secret}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://192.168.1.4:3000}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY}
    ports:
      - "0.0.0.0:8000:8000"   # Backend accessible from network for agent registration
    volumes:
      - ./backend:/app
      - ./correlation_engine/rules:/app/rules:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - securewatch-net
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: securewatch-frontend
    ports:
      - "0.0.0.0:3000:3000"   # Dashboard accessible from home network
    depends_on:
      - backend
    networks:
      - securewatch-net
    logging: *default-logging

  correlation_engine:
    build:
      context: ./correlation_engine
      dockerfile: Dockerfile
    container_name: securewatch-correlation-engine
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass123!}@redis:6379/0
      - FASTAPI_URL=http://backend:8000
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY}
    volumes:
      - ./correlation_engine:/app
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - securewatch-net
    logging: *default-logging

  manager:
    build:
      context: ./manager
      dockerfile: Dockerfile
    container_name: securewatch-manager
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass123!}@redis:6379/0
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-siemuser}:${POSTGRES_PASSWORD:-siempass123!}@postgres:5432/${POSTGRES_DB:-siemdb}
    ports:
      - "0.0.0.0:1514:1514"    # Agent communication port
    volumes:
      - ./manager:/app
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - securewatch-net
    logging: *default-logging
    restart: unless-stopped

networks:
  securewatch-net:
    driver: bridge

volumes:
  securewatch-es-data:
  securewatch-pg-data:
  securewatch-redis-data:
